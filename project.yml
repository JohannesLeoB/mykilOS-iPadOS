name: mykilOSiPad
options:
  bundleIdPrefix: com.johannes
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    TARGETED_DEVICE_FAMILY: "2"
    ENABLE_PREVIEWS: YES
    DEVELOPMENT_TEAM: ""

targets:
  mykilOSiPad:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/mykilOSiPad
      - path: Resources
        buildPhase: resources
    info:
      path: Sources/mykilOSiPad/Info.plist
      properties:
        CFBundleDisplayName: mykilOS
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: false
        NSBluetoothAlwaysUsageDescription: "mykilOS verbindet sich mit deinem Bluetooth-Laser-Entfernungsmesser, um Maße direkt beim Aufmaß zu übernehmen."
        NSCameraUsageDescription: "mykilOS nutzt die Kamera, um Fotos für das Aufmaß aufzunehmen und zu bemaßen."
        NSPhotoLibraryAddUsageDescription: "mykilOS speichert Aufmaß-Fotos und PDF-Exporte in deiner Fotomediathek, wenn du das auswählst."
        NSLocalNetworkUsageDescription: "mykilOS sucht im lokalen Netzwerk nach unterstützten Messgeräten."
        NSMotionUsageDescription: "mykilOS nutzt die Bewegungssensoren für die Kamera-Wasserwaage und die Wasserwaage im Werkzeugkasten."
        NSMicrophoneUsageDescription: "mykilOS nutzt das Mikrofon für die Diktat-Mängelaufnahme im Abnahmeprotokoll und den Raumakustik-Check — Audio verlässt das Gerät nicht."
        NSSpeechRecognitionUsageDescription: "mykilOS wandelt dein Diktat on-device in Text um (Abnahmeprotokoll) — kein Cloud-Dienst, kein Audio-Upload."
        NSContactsUsageDescription: "mykilOS legt aus einer abfotografierten Visitenkarte auf deinen Tipp hin einen neuen Kontakt an — nur nach ausdrücklicher Bestätigung, nie automatisch."
        NSLocationWhenInUseUsageDescription: "mykilOS merkt sich den Standort eines Feld-Fotos als Teil der Beweiskette — nur beim Aufnehmen, kein Tracking."
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UIAppFonts:
          - ABCMonumentGrotesk-Medium.otf
          - ABCMonumentGroteskMono-Regular.otf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.johannes.mykilOSiPad
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: false
        SUPPORTED_PLATFORMS: iphoneos iphonesimulator
    capabilities:
      - com.apple.developer.corebluetooth: {}
  mykilOSiPadTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/mykilOSiPadTests
    dependencies:
      - target: mykilOSiPad
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  mykilOSiPad:
    build:
      targets:
        mykilOSiPad: all
        mykilOSiPadTests: [test]
    test:
      targets:
        - mykilOSiPadTests
    run:
      config: Debug
